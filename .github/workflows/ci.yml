name: Python CI
on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [ released ]

permissions: {}

jobs:
  linting:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --group dev --frozen
      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  test-app:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - name: Create Ganache network
      run: docker network create ganache
    - name: Setup and run ganache
      run: docker run --detach --publish 8545:8545 --network ganache -e DOCKER=true trufflesuite/ganache:latest --defaultBalanceEther 10000 --gasLimit 10000000 -a 30 --chain.chainId 1337 --chain.networkId 1337 -d
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Install dependencies
      run: uv sync --group dev --all-extras --frozen
    - name: Run tests and coverage
      run: |
        uv run coverage run -m pytest -rxXs
        uv run coverage combine
        uv run coverage lcov -o coverage.lcov
    - name: Coveralls Parallel
      uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
      with:
        file: coverage.lcov
        flag-name: run-${{ matrix.python-version }}
        parallel: true

  finish:
    permissions:
      contents: read
    needs: test-app
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls Finished
      uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
      with:
        parallel-finished: true

  publish:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: test-app
    if: github.event_name == 'release' && github.event.action == 'released'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: '3.13'
    - name: Deploy Package
      run: |
        uv build
        uv publish
      env:
        UV_PUBLISH_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  docker-deploy:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: test-app
    if: github.event_name == 'release' && github.event.action == 'released'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      with:
        platforms: arm64
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - name: Dockerhub login
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Deploy Tag
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: Dockerfile
        push: true
        tags: |
          safeglobal/safe-cli:${{ github.event.release.tag_name }}
          safeglobal/safe-cli:latest
        platforms: |
          linux/amd64
          linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
