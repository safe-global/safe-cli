name: Python CI
on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [ released ]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --group dev --frozen
      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  test-app:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - name: Create Ganache network
      run: docker network create ganache
    - name: Setup and run ganache
      run: docker run --detach --publish 8545:8545 --network ganache -e DOCKER=true trufflesuite/ganache:latest --defaultBalanceEther 10000 --gasLimit 10000000 -a 30 --chain.chainId 1337 --chain.networkId 1337 -d
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Install dependencies
      run: uv sync --group dev --all-extras --frozen
    - name: Run tests and coverage
      run: |
        uv run coverage run -m pytest -rxXs
        uv run coverage combine
        uv run coverage lcov -o coverage.lcov
    - name: Coveralls Parallel
      uses: coverallsapp/github-action@v2
      with:
        file: coverage.lcov
        flag-name: run-${{ matrix.python-version }}
        parallel: true

  finish:
    needs: test-app
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls Finished
      uses: coverallsapp/github-action@v2
      with:
        parallel-finished: true

  publish:
    runs-on: ubuntu-latest
    needs: test-app
    if: github.event_name == 'release' && github.event.action == 'released'
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.13'
    - name: Deploy Package
      run: |
        uv build
        uv publish
      env:
        UV_PUBLISH_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  docker-deploy:
    runs-on: ubuntu-latest
    needs: test-app
    if: github.event_name == 'release' && github.event.action == 'released'
    steps:
    - uses: actions/checkout@v6
    - uses: docker/setup-qemu-action@v4
      with:
        platforms: arm64
    - uses: docker/setup-buildx-action@v4
    - name: Dockerhub login
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Deploy Tag
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile
        push: true
        tags: |
          safeglobal/safe-cli:${{ github.event.release.tag_name }}
          safeglobal/safe-cli:latest
        platforms: |
          linux/amd64
          linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
